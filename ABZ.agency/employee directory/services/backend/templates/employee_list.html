<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список сотрудников</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container my-4">
        <h1 class="mb-4">Список сотрудников</h1>
        <p><a href="/"> &larr; Вернуться к дереву</a></p>
        <form action="/list" method="GET" class="mb-4" id="search-form">
            <div class="input-group">
                <input type="text" name="search" id="search-input" class="form-control"
                    placeholder="Поиск по ФИО или должности...">
                <button class="btn btn-outline-primary" type="submit">Найти</button>
            </div>
        </form>
        <table class="table table-striped table-hover">
            <thead class="thead-dark">
                <tr>
                    <th><a href="#" data-sort="full_name">ФИО</a></th>
                    <th><a href="#" data-sort="position">Должность</a></th>
                    <th><a href="#" data-sort="hire_date">Дата найма</a></th>
                    <th><a href="#" data-sort="salary">Зарплата</a></th>
                </tr>
            </thead>
            <tbody id="employee-table-body">
            </tbody>
        </table>
    </div>
    <script src="/static/js/employee_list.js"></script>
</body>

</html>
