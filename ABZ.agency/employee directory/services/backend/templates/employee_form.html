<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма сотрудников</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container my-4">
        <h1 id="form-title" class="mb-4">Создание сотрудника</h1>
        <p><a href="/list">&lArr; Назад к списку</a></p>

        <form id="employee-form">
            <div class="mb-3">
                <label for="full_name" class="from-label">ФИО</label>
                <input type="text" class="form-control" id="full_name" required>
            </div>
            <div class="mb-3">
                <label for="" class="from-label">Должность</label>
                <input type="text" class="form-control" id="position" required>
            </div>
            <div class="mb-3">
                <label for="" class="from-label">Дата найма</label>
                <input type="date" class="form-control" id="hire_date" required>
            </div>
            <div class="mb-3">
                <label for="" class="from-label">Зарплата</label>
                <input type="number" step="0.01" class="form-control" id="salary" required>
            </div>
            <div class="mb-3">
                <label for="" class="from-label">ID Менеджера</label>
                <input type="number" class="form-control" id="manager_id" placeholder="Оставте пустым, если нет">
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <p id="error-message" class="mt-3 text-danger"></p>
        </form>
    </div>
    <script src="/static/js/employee_form.js"></script>
</body>

</html>
